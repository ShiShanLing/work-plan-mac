# 在推送版本标签（如 v1.0.5）时构建 Release .app，打成 zip 并挂到 GitHub Release。
#
# 必要条件（仓库 Settings → Secrets and variables → Actions）：
#   APPLE_TEAM_ID                      : 10 位 Team ID（与 Xcode Signing 里一致）
#   BUILD_CERTIFICATE_BASE64           : 导出 .p12 后的 Base64（不要含换行，或脚本会去掉空白）
#   P12_PASSWORD                       : 导出 .p12 时设的密码
#   KEYCHAIN_PASSWORD                  : 任意强密码，仅用于 CI 临时钥匙串
#   APP_STORE_CONNECT_API_ISSUER_ID    : App Store Connect → 用户和访问 → 集成 → 密钥 → 颁发者 ID
#   APP_STORE_CONNECT_API_KEY_ID       : 同上，密钥 ID
#   APP_STORE_CONNECT_API_KEY_P8_BASE64: 下载的 AuthKey_xxx.p8 全文做 Base64（便于贴 Secret）
#
# 说明：仅有 .p12 不能让 xcodebuild 在 CI 上自动生成/拉取「Mac App Development」描述文件；
# 必须 -allowProvisioningUpdates + 上述 API 密钥（需已加入 Apple Developer Program，个人免费团队
# 通常无法在 App Store Connect 创建 API 密钥，若无密钥请改成本地打包或自行导出 .mobileprovision 走手动签名）。
#
# 使用：git tag v1.0.5 && git push origin v1.0.5
#
# 默认关闭云端 Job：仅用本地 scripts/release-local-gh.sh 发版时，不要设置 USE_CLOUD_RELEASE。
# 需在 GitHub Actions 云机构建时：仓库 Settings → Variables → Actions → 新建
# USE_CLOUD_RELEASE = true（并配齐 Secrets）。

name: Release (macOS .app)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ vars.USE_CLOUD_RELEASE == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment (Xcode / 路径便于对照日志)
        run: |
          xcodebuild -version
          sw_vers

      - name: Import code signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ] || [ -z "${P12_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "::error::缺少 BUILD_CERTIFICATE_BASE64 / P12_PASSWORD / KEYCHAIN_PASSWORD 之一。"
            exit 1
          fi
          # GitHub Secret 粘贴时可能带首尾换行
          B64="$(printf '%s' "$BUILD_CERTIFICATE_BASE64" | tr -d ' \t\r\n')"
          CERT_PATH="$RUNNER_TEMP/signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          printf '%s' "$B64" | base64 --decode > "$CERT_PATH"
          if ! file "$CERT_PATH" | grep -q 'data\|Certificates'; then
            echo "::warning::cert 文件类型: $(file "$CERT_PATH")"
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" || {
            echo "::error::导入 .p12 失败（密码错误、未含私钥、或 Base64 损坏）。请重新导出「证书 + 私钥」为 .p12 并重做 Base64。"
            exit 1
          }
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          echo "可用的代码签名身份（供对照 Team）:"
          security find-identity -v -p codesigning || true

      - name: Resolve SPM
        run: xcodebuild -resolvePackageDependencies -scheme MiniTools-SwiftUI -project MiniTools-SwiftUI.xcodeproj -derivedDataPath DerivedData

      - name: Build Release
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::error::请配置 secret APPLE_TEAM_ID"
            exit 1
          fi
          if [ -z "${APP_STORE_CONNECT_API_ISSUER_ID:-}" ] || [ -z "${APP_STORE_CONNECT_API_KEY_ID:-}" ] || [ -z "${APP_STORE_CONNECT_API_KEY_P8_BASE64:-}" ]; then
            echo "::error::缺少 App Store Connect API 密钥（APP_STORE_CONNECT_API_ISSUER_ID / APP_STORE_CONNECT_API_KEY_ID / APP_STORE_CONNECT_API_KEY_P8_BASE64）。"
            echo "::error::否则 xcodebuild 无法在 CI 上拉取 Mac App Development 描述文件。见 workflow 文件顶注释。"
            exit 1
          fi
          P8_B64="$(printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | tr -d ' \t\r\n')"
          printf '%s' "$P8_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"
          set -o pipefail
          xcodebuild \
            -scheme MiniTools-SwiftUI \
            -project MiniTools-SwiftUI.xcodeproj \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath DerivedData \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            build 2>&1 | tee build.log
          APP="$(find "$PWD/DerivedData" -name 'MiniTools-SwiftUI.app' -type d | head -1)"
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::未找到 MiniTools-SwiftUI.app，请查看上文 xcodebuild 与 build.log"
            find DerivedData -name '*.app' -type d || true
            exit 1
          fi
          echo "APP=$APP"
          zip_name="MiniTools-SwiftUI-${{ github.ref_name }}.zip"
          ditto -c -k --keepParent "$APP" "$zip_name"
          shasum -a 256 "$zip_name" | tee "$zip_name.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MiniTools-SwiftUI-${{ github.ref_name }}.zip
            MiniTools-SwiftUI-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
